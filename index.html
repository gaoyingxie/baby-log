<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>宝宝成长记录</title>
  <style>
    :root {
      --bg: #f5f6fa;
      --card: #ffffff;
      --primary: #6c5ce7;
      --primary-light: rgba(108,92,231,0.1);
      --poop: #e17055;
      --poop-bg: rgba(225,112,85,0.12);
      --pee: #74b9ff;
      --pee-bg: rgba(116,185,255,0.12);
      --milk: #fdcb6e;
      --milk-bg: rgba(253,203,110,0.2);
      --text: #2d3436;
      --text-light: #636e72;
      --border: #dfe6e9;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 20px;
      --radius-sm: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    .container { max-width: 480px; margin: 0 auto; padding: 0 16px 100px; }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 16px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 span { font-size: 26px; }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: var(--card);
      box-shadow: var(--shadow);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    .icon-btn:active { transform: scale(0.92); }

    /* Card */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Record Buttons */
    .record-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .record-btn {
      height: 90px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .record-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
    }

    .record-btn:active {
      transform: scale(0.96);
    }

    .record-btn .icon { font-size: 36px; position: relative; z-index: 1; }
    .record-btn .label { position: relative; z-index: 1; }

    .record-btn.poop { background: linear-gradient(145deg, var(--poop), #d63031); }
    .record-btn.pee { background: linear-gradient(145deg, var(--pee), #0984e3); }
    .record-btn.milk { background: linear-gradient(145deg, var(--milk), #f9a825); color: #5d4e1a; }
    .record-btn.breast { background: linear-gradient(145deg, #fd79a8, #e84393); }

    /* Stats */
    .stats-row {
      display: flex;
      gap: 10px;
    }

    .stat-item {
      flex: 1;
      text-align: center;
      padding: 14px 8px;
      border-radius: var(--radius-sm);
      background: var(--bg);
    }

    .stat-item .icon { font-size: 22px; margin-bottom: 4px; }
    .stat-item .num { font-size: 28px; font-weight: 700; }
    .stat-item .label { font-size: 11px; color: var(--text-light); margin-top: 2px; }

    .stat-item.poop .num { color: var(--poop); }
    .stat-item.pee .num { color: var(--pee); }
    .stat-item.milk .num { color: #d4a017; }

    /* History */
    .history-list { display: flex; flex-direction: column; }

    .history-item {
      display: flex;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .history-item:last-child { border-bottom: none; }

    .history-item .time {
      font-size: 12px;
      color: var(--text-light);
      width: 55px;
      flex-shrink: 0;
    }

    .history-item .type-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .history-item.poop .type-icon { background: var(--poop-bg); }
    .history-item.pee .type-icon { background: var(--pee-bg); }
    .history-item.milk .type-icon { background: var(--milk-bg); }

    .history-item .type-name { font-weight: 600; font-size: 14px; }
    .history-item.poop .type-name { color: var(--poop); }
    .history-item.pee .type-name { color: #0984e3; }
    .history-item.milk .type-name { color: #d4a017; }

    .history-empty {
      text-align: center;
      padding: 30px;
      color: var(--text-light);
      font-size: 14px;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 15px;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .toast.show { opacity: 1; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--card);
      border-radius: 24px 24px 0 0;
      padding: 24px;
      width: 100%;
      max-width: 480px;
      transform: translateY(100%);
      transition: transform 0.3s;
    }

    .modal-overlay.show .modal { transform: translateY(0); }

    .modal-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 16px;
      text-align: center;
    }

    .modal-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .modal-btn.export { background: var(--primary); color: white; }
    .modal-btn.import { background: var(--primary-light); color: var(--primary); }
    .modal-btn.cancel { background: var(--bg); color: var(--text-light); margin-top: 6px; }

    .modal-btn:active { transform: scale(0.98); }

    #importFile { display: none; }

    /* Version */
    .version {
      text-align: center;
      font-size: 11px;
      color: var(--text-light);
      padding: 10px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><span>👶</span> 宝宝成长记录</h1>
      <div class="header-actions">
        <button class="icon-btn" onclick="showMenu()" title="更多">⚙️</button>
      </div>
    </header>

    <!-- 快速记录 -->
    <div class="card">
      <div class="card-title">✨ 点击记录</div>
      <div class="record-grid">
        <button class="record-btn poop" onclick="record('大便')">
          <span class="icon">💩</span>
          <span class="label">大便</span>
        </button>
        <button class="record-btn pee" onclick="record('小便')">
          <span class="icon">🚼</span>
          <span class="label">小便</span>
        </button>
        <button class="record-btn milk" onclick="record('喝奶-奶粉')">
          <span class="icon">🍼</span>
          <span class="label">奶粉</span>
        </button>
        <button class="record-btn breast" onclick="record('喝奶-母乳')">
          <span class="icon">🤱</span>
          <span class="label">母乳</span>
        </button>
      </div>
    </div>

    <!-- 今日统计 -->
    <div class="card">
      <div class="card-title">📊 今日统计</div>
      <div class="stats-row">
        <div class="stat-item poop">
          <div class="icon">💩</div>
          <div class="num" id="todayPoop">0</div>
          <div class="label">大便</div>
        </div>
        <div class="stat-item pee">
          <div class="icon">🚼</div>
          <div class="num" id="todayPee">0</div>
          <div class="label">小便</div>
        </div>
        <div class="stat-item milk">
          <div class="icon">🍼</div>
          <div class="num" id="todayMilk">0</div>
          <div class="label">喝奶</div>
        </div>
      </div>
    </div>

    <!-- 最近记录 -->
    <div class="card">
      <div class="card-title">📋 最近记录</div>
      <div class="history-list" id="historyList">
        <div class="history-empty">暂无记录<br>点击上方按钮开始记录</div>
      </div>
    </div>

    <div class="version">v0.2</div>
  </div>

  <!-- 设置菜单 -->
  <div class="modal-overlay" id="menuModal" onclick="hideMenu(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">更多操作</div>
      <button class="modal-btn export" onclick="exportData()">
        📤 导出备份
      </button>
      <button class="modal-btn import" onclick="document.getElementById('importFile').click()">
        📥 导入备份
      </button>
      <input type="file" id="importFile" accept=".json" onchange="importData(this.files[0])">
      <button class="modal-btn cancel" onclick="hideMenu()">取消</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ============== 配置 ==============
    const STORAGE_KEY = 'baby_log_records';
    const TYPE_MAP = {
      '大便': { icon: '💩', class: 'poop' },
      '小便': { icon: '🚼', class: 'pee' },
      '喝奶-奶粉': { icon: '🍼', class: 'milk' },
      '喝奶-母乳': { icon: '🤱', class: 'milk' }
    };

    // ============== 存储 ==============
    function getRecords() {
      const data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    }

    function saveRecords(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function addRecord(type) {
      const records = getRecords();
      records.push({
        id: Date.now().toString(),
        type: type,
        time: new Date().toISOString()
      });
      saveRecords(records);
      return records[records.length - 1];
    }

    // ============== UI ==============
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function showMenu() {
      document.getElementById('menuModal').classList.add('show');
    }

    function hideMenu(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('menuModal').classList.remove('show');
    }

    function formatTime(iso) {
      const d = new Date(iso);
      const h = d.getHours().toString().padStart(2, '0');
      const m = d.getMinutes().toString().padStart(2, '0');
      return `${h}:${m}`;
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const mon = d.getMonth() + 1;
      const day = d.getDate();
      return `${mon}月${day}日`;
    }

    // ============== 记录 ==============
    function record(type) {
      // 震动
      if (navigator.vibrate) navigator.vibrate(50);

      // 添加记录
      addRecord(type);

      // 动画反馈
      const btns = document.querySelectorAll('.record-btn');
      btns.forEach(btn => {
        if (btn.textContent.includes(type.replace('喝奶-', ''))) {
          btn.style.transform = 'scale(1.1)';
          setTimeout(() => btn.style.transform = '', 200);
        }
      });

      showToast('✅ 已记录');
      updateUI();
    }

    // ============== 更新界面 ==============
    function updateUI() {
      const records = getRecords();
      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());

      // 统计今日
      let todayPoop = 0, todayPee = 0, todayMilk = 0;
      records.forEach(r => {
        const t = new Date(r.time);
        if (t >= todayStart) {
          if (r.type === '大便') todayPoop++;
          else if (r.type === '小便') todayPee++;
          else if (r.type === '喝奶-奶粉' || r.type === '喝奶-母乳') todayMilk++;
        }
      });

      document.getElementById('todayPoop').textContent = todayPoop;
      document.getElementById('todayPee').textContent = todayPee;
      document.getElementById('todayMilk').textContent = todayMilk;

      // 最近记录（今天）
      const todayRecords = records
        .filter(r => new Date(r.time) >= todayStart)
        .sort((a, b) => new Date(b.time) - new Date(a.time))
        .slice(0, 10);

      // 如果今天没记录，显示昨天的
      const showRecords = todayRecords.length > 0 ? todayRecords : records.slice(-5).reverse();

      const list = document.getElementById('historyList');
      if (records.length === 0) {
        list.innerHTML = '<div class="history-empty">暂无记录<br>点击上方按钮开始记录</div>';
        return;
      }

      // 判断是否显示日期
      const showDate = todayRecords.length === 0 && records.length > 0;

      list.innerHTML = showRecords.map(r => {
        const map = TYPE_MAP[r.type] || TYPE_MAP['大便'];
        const timeStr = showDate ? formatDate(r.time) + ' ' + formatTime(r.time) : formatTime(r.time);
        return `
          <div class="history-item ${map.class}">
            <div class="time">${timeStr}</div>
            <div class="type-icon">${map.icon}</div>
            <div class="type-name">${r.type}</div>
          </div>
        `;
      }).join('');
    }

    // ============== 导出导入 ==============
    function exportData() {
      const records = getRecords();
      const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `baby-log-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      hideMenu();
      showToast('📤 导出成功');
    }

    async function importData(file) {
      if (!file) return;
      try {
        const text = await file.text();
        const imported = JSON.parse(text);
        if (!Array.isArray(imported)) throw new Error('格式错误');

        const existing = getRecords();
        const seen = new Set(existing.map(r => r.id));
        const newRecords = imported.filter(r => !seen.has(r.id));
        saveRecords([...existing, ...newRecords]);

        hideMenu();
        showToast(`✅ 导入成功，新增 ${newRecords.length} 条`);
        updateUI();
      } catch (e) {
        hideMenu();
        showToast('❌ 导入失败');
      }
    }

    // 初始化
    updateUI();
  </script>
</body>
</html>
