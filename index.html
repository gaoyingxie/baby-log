<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>宝宝成长记录</title>
  <style>
    :root {
      --bg: #f5f6fa;
      --card: #ffffff;
      --primary: #6c5ce7;
      --primary-light: rgba(108,92,231,0.1);
      --poop: #e17055;
      --poop-bg: rgba(225,112,85,0.12);
      --pee: #74b9ff;
      --pee-bg: rgba(116,185,255,0.12);
      --milk: #fdcb6e;
      --milk-bg: rgba(253,203,110,0.2);
      --breast: #fd79a8;
      --breast-bg: rgba(253,121,168,0.12);
      --text: #2d3436;
      --text-light: #636e72;
      --border: #dfe6e9;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 20px;
      --radius-sm: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 70px;
    }

    .container { max-width: 480px; margin: 0 auto; padding: 0 16px; }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 16px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 span { font-size: 26px; }

    .header-actions { display: flex; gap: 8px; }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: var(--card);
      box-shadow: var(--shadow);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    .icon-btn:active { transform: scale(0.92); }

    /* Tab Nav */
    .tab-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--card);
      color: var(--text-light);
      box-shadow: var(--shadow);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .tab-btn.active {
      background: var(--primary);
      color: white;
    }

    .tab-btn .icon { font-size: 18px; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Card */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Record Buttons */
    .record-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .record-btn {
      height: 90px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .record-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
    }

    .record-btn:active { transform: scale(0.96); }
    .record-btn .icon { font-size: 36px; position: relative; z-index: 1; }
    .record-btn .label { position: relative; z-index: 1; }

    .record-btn.poop { background: linear-gradient(145deg, var(--poop), #d63031); }
    .record-btn.pee { background: linear-gradient(145deg, var(--pee), #0984e3); }
    .record-btn.milk { background: linear-gradient(145deg, var(--milk), #f9a825); color: #5d4e1a; }
    .record-btn.breast { background: linear-gradient(145deg, var(--breast), #e84393); }

    /* Stats */
    .stats-row { display: flex; gap: 10px; }

    .stat-item {
      flex: 1;
      text-align: center;
      padding: 14px 8px;
      border-radius: var(--radius-sm);
      background: var(--bg);
    }

    .stat-item .icon { font-size: 22px; margin-bottom: 4px; }
    .stat-item .num { font-size: 28px; font-weight: 700; }
    .stat-item .label { font-size: 11px; color: var(--text-light); margin-top: 2px; }

    .stat-item.poop .num { color: var(--poop); }
    .stat-item.pee .num { color: var(--pee); }
    .stat-item.milk .num { color: #d4a017; }
    .stat-item.breast .num { color: var(--breast); }

    /* History Filter */
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 8px 14px;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      background: var(--card);
      color: var(--text-light);
      box-shadow: var(--shadow);
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: var(--primary);
      color: white;
    }

    /* History List */
    .history-list { display: flex; flex-direction: column; }

    .history-item {
      display: flex;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .history-item:last-child { border-bottom: none; }

    .history-item .time {
      font-size: 12px;
      color: var(--text-light);
      width: 70px;
      flex-shrink: 0;
    }

    .history-item .type-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .history-item.poop .type-icon { background: var(--poop-bg); }
    .history-item.pee .type-icon { background: var(--pee-bg); }
    .history-item.milk .type-icon { background: var(--milk-bg); }
    .history-item.breast .type-icon { background: var(--breast-bg); }

    .history-item .info { flex: 1; }
    .history-item .type-name { font-weight: 600; font-size: 14px; }
    .history-item .type-name.poop { color: var(--poop); }
    .history-item .type-name.pee { color: #0984e3; }
    .history-item .type-name.milk { color: #d4a017; }
    .history-item .type-name.breast { color: var(--breast); }

    .history-item .relative {
      font-size: 11px;
      color: var(--text-light);
    }

    .history-empty {
      text-align: center;
      padding: 30px;
      color: var(--text-light);
      font-size: 14px;
    }

    /* Week Chart */
    .week-chart {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      height: 100px;
      padding: 10px 0;
    }

    .chart-bar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .chart-bar .bar {
      width: 28px;
      border-radius: 6px 6px 0 0;
      min-height: 4px;
      transition: height 0.3s;
    }

    .chart-bar .bar.poop { background: var(--poop); }
    .chart-bar .bar.pee { background: var(--pee); }
    .chart-bar .bar.milk { background: var(--milk); }

    .chart-bar .day {
      font-size: 11px;
      color: var(--text-light);
    }

    /* Summary Stats */
    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .summary-item {
      padding: 12px;
      border-radius: var(--radius-sm);
      background: var(--bg);
      text-align: center;
    }

    .summary-item .val { font-size: 24px; font-weight: 700; color: var(--primary); }
    .summary-item .lbl { font-size: 11px; color: var(--text-light); margin-top: 2px; }

    /* Toast */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 15px;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .toast.show { opacity: 1; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-overlay.show { opacity: 1; pointer-events: auto; }

    .modal {
      background: var(--card);
      border-radius: 24px 24px 0 0;
      padding: 24px;
      width: 100%;
      max-width: 480px;
      transform: translateY(100%);
      transition: transform 0.3s;
    }

    .modal-overlay.show .modal { transform: translateY(0); }

    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; text-align: center; }

    .modal-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .modal-btn.export { background: var(--primary); color: white; }
    .modal-btn.import { background: var(--primary-light); color: var(--primary); }
    .modal-btn.cancel { background: var(--bg); color: var(--text-light); margin-top: 6px; }
    .modal-btn:active { transform: scale(0.98); }

    #importFile { display: none; }

    .version { text-align: center; font-size: 11px; color: var(--text-light); padding: 10px 0; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><span>👶</span> 宝宝成长记录</h1>
      <div class="header-actions">
        <button class="icon-btn" onclick="showMenu()" title="更多">⚙️</button>
      </div>
    </header>

    <!-- Tab 导航 -->
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="recordTab" onclick="switchTab('recordTab')">
        <span class="icon">✏️</span> 记录
      </button>
      <button class="tab-btn" data-tab="historyTab" onclick="switchTab('historyTab')">
        <span class="icon">📋</span> 历史
      </button>
    </div>

    <!-- 记录 Tab -->
    <div class="tab-content active" id="recordTab">
      <!-- 快速记录 -->
      <div class="card">
        <div class="card-title">✨ 点击记录</div>
        <div class="record-grid">
          <button class="record-btn poop" onclick="record('大便')">
            <span class="icon">💩</span>
            <span class="label">大便</span>
          </button>
          <button class="record-btn pee" onclick="record('小便')">
            <span class="icon">🚼</span>
            <span class="label">小便</span>
          </button>
          <button class="record-btn milk" onclick="record('喂奶')">
            <span class="icon">🍼</span>
            <span class="label">瓶喂</span>
          </button>
          <button class="record-btn breast" onclick="record('亲喂')">
            <span class="icon">🤱</span>
            <span class="label">亲喂</span>
          </button>
        </div>
      </div>

      <!-- 今日统计 -->
      <div class="card">
        <div class="card-title">📊 今日统计 <span style="font-weight:normal;font-size:12px;color:var(--text-light)">（点击查看详情）</span></div>
        <div class="stats-row">
          <div class="stat-item poop" onclick="showTodayDetail('大便')" style="cursor:pointer;">
            <div class="icon">💩</div>
            <div class="num" id="todayPoop">0</div>
            <div class="label">大便</div>
          </div>
          <div class="stat-item pee" onclick="showTodayDetail('小便')" style="cursor:pointer;">
            <div class="icon">🚼</div>
            <div class="num" id="todayPee">0</div>
            <div class="label">小便</div>
          </div>
          <div class="stat-item milk" onclick="showTodayDetail('喝奶')" style="cursor:pointer;">
            <div class="icon">🍼</div>
            <div class="num" id="todayMilkAmount">0</div>
            <div class="label">喝奶 ml</div>
          </div>
          <div class="stat-item" onclick="showTodayDetail('喂奶')" style="cursor:pointer;">
            <div class="icon">🍼🤱</div>
            <div class="num" id="todayFeedCount">0</div>
            <div class="label">喂奶 次</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 历史 Tab -->
    <div class="tab-content" id="historyTab">
      <!-- 筛选 -->
      <div class="filter-row">
        <button class="filter-btn active" data-filter="today" onclick="setHistoryFilter('today')">今天</button>
        <button class="filter-btn" data-filter="week" onclick="setHistoryFilter('week')">本周</button>
        <button class="filter-btn" data-filter="month" onclick="setHistoryFilter('month')">本月</button>
        <button class="filter-btn" data-filter="all" onclick="setHistoryFilter('all')">全部</button>
      </div>

      <!-- 汇总统计 -->
      <div class="card">
        <div class="card-title">📊 汇总</div>
        <div class="summary-grid">
          <div class="summary-item">
            <div class="val" id="totalCount">0</div>
            <div class="lbl">总记录</div>
          </div>
          <div class="summary-item">
            <div class="val" id="avgPerDay">0</div>
            <div class="lbl">日均</div>
          </div>
        </div>
      </div>

      <!-- 历史列表 -->
      <div class="card">
        <div class="card-title">📋 记录列表</div>
        <div class="history-list" id="historyList">
          <div class="history-empty">暂无记录</div>
        </div>
      </div>
    </div>

    <div class="version">v0.5</div>
  </div>

  <!-- 设置菜单 -->
  <div class="modal-overlay" id="menuModal" onclick="hideMenu(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">更多操作</div>
      <button class="modal-btn export" onclick="exportData()">📤 导出备份</button>
      <button class="modal-btn import" onclick="document.getElementById('importFile').click()">📥 导入备份</button>
      <input type="file" id="importFile" accept=".json" onchange="importData(this.files[0])">
      <button class="modal-btn cancel" onclick="hideMenu()">取消</button>
    </div>
  </div>

  <!-- 喂奶弹窗 -->
  <div class="modal-overlay" id="milkModal" onclick="hideMilkModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">🍼 记录喂奶</div>
      <div style="margin-bottom: 12px;">
        <label style="font-size:13px;color:var(--text-light);display:block;margin-bottom:6px;">日期和时间</label>
        <input type="datetime-local" id="milkDateTime"
               style="width:100%;padding:12px;border:2px solid var(--border);border-radius:12px;font-size:14px;outline:none;">
      </div>
      <div style="display:flex;gap:10px;margin-bottom:12px;">
        <button id="typeFormula" onclick="selectMilkType('formula')" 
                style="flex:1;padding:12px;border:2px solid var(--border);border-radius:12px;background:white;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;">
          <span>🍼</span><span>奶粉</span>
        </button>
        <button id="typeBreast" onclick="selectMilkType('breast')"
                style="flex:1;padding:12px;border:2px solid var(--border);border-radius:12px;background:white;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;">
          <span>🤱</span><span>母乳</span>
        </button>
      </div>
      <div style="margin-bottom: 16px;">
        <label style="font-size:13px;color:var(--text-light);display:block;margin-bottom:6px;">奶量（ml）</label>
        <input type="number" id="milkAmount" placeholder="例如：120" 
               style="width:100%;padding:12px;border:2px solid var(--border);border-radius:12px;font-size:14px;outline:none;">
      </div>
      <button class="modal-btn export" onclick="confirmMilk()">确认记录</button>
      <button class="modal-btn cancel" onclick="hideMilkModal()">取消</button>
    </div>
  </div>

  <!-- 大便/小便弹窗 -->
  <div class="modal-overlay" id="poopPeeModal" onclick="hidePoopPeeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title" id="poopPeeTitle">💩 记录</div>
      <div style="margin-bottom: 16px;">
        <label style="font-size:13px;color:var(--text-light);display:block;margin-bottom:6px;">日期和时间</label>
        <input type="datetime-local" id="poopPeeDateTime"
               style="width:100%;padding:12px;border:2px solid var(--border);border-radius:12px;font-size:14px;outline:none;">
      </div>
      <button class="modal-btn export" onclick="confirmPoopPee()">确认记录</button>
      <button class="modal-btn cancel" onclick="hidePoopPeeModal()">取消</button>
    </div>
  </div>

  <!-- 亲喂弹窗 -->
  <div class="modal-overlay" id="breastFeedModal" onclick="hideBreastFeedModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">🤱 记录亲喂</div>
      <div style="margin-bottom: 16px;">
        <label style="font-size:13px;color:var(--text-light);display:block;margin-bottom:6px;">日期和时间</label>
        <input type="datetime-local" id="breastFeedDateTime"
               style="width:100%;padding:12px;border:2px solid var(--border);border-radius:12px;font-size:14px;outline:none;">
      </div>
      <button class="modal-btn export" onclick="confirmBreastFeed()">确认记录</button>
      <button class="modal-btn cancel" onclick="hideBreastFeedModal()">取消</button>
    </div>
  </div>

  <!-- 今日详情弹窗 -->
  <div class="modal-overlay" id="todayDetailModal" onclick="hideTodayDetailModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title" id="todayDetailTitle">📋 今日详情</div>
      <div id="todayDetailList" style="max-height:300px;overflow-y:auto;"></div>
      <button class="modal-btn cancel" onclick="hideTodayDetailModal()" style="margin-top:16px;">关闭</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ========== 配置 ==========
    const STORAGE_KEY = 'baby_log_records';
    const TYPE_MAP = {
      '大便':    { icon: '💩', class: 'poop' },
      '小便':    { icon: '🚼', class: 'pee' },
      '喝奶-奶粉': { icon: '🍼', class: 'milk' },
      '喝奶-母乳': { icon: '🤱', class: 'breast' },
      '亲喂':     { icon: '🤱', class: 'breast' }
    };

    let currentFilter = 'today';
    let selectedMilkType = 'formula';
    let pendingPoopPeeType = null;

    // ========== 存储 ==========
    function getRecords() {
      const data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    }

    function saveRecords(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function addRecord(type, amount, time) {
      const records = getRecords();
      records.push({ id: Date.now().toString(), type, time: time || new Date().toISOString(), amount: amount || null });
      saveRecords(records);
      return records[records.length - 1];
    }

    // ========== UI ==========
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function showMenu() { document.getElementById('menuModal').classList.add('show'); }
    function hideMenu(e) { if (e && e.target !== e.currentTarget) return; document.getElementById('menuModal').classList.remove('show'); }

    function showFeedMilkModal() {
      selectedMilkType = 'formula';
      updateMilkTypeUI();
      document.getElementById('milkAmount').value = '';
      // 默认当前时间
      const now = new Date();
      const iso = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
      document.getElementById('milkDateTime').value = iso;
      document.getElementById('milkModal').classList.add('show');
      setTimeout(() => document.getElementById('milkAmount').focus(), 100);
    }

    function selectMilkType(type) {
      selectedMilkType = type;
      updateMilkTypeUI();
    }

    function updateMilkTypeUI() {
      const normalBorder = '2px solid var(--border)';
      const formulaBtn = document.getElementById('typeFormula');
      const breastBtn = document.getElementById('typeBreast');
      if (selectedMilkType === 'formula') {
        formulaBtn.style.borderColor = 'var(--milk)';
        formulaBtn.style.background = 'var(--milk-bg)';
        breastBtn.style.borderColor = normalBorder;
        breastBtn.style.background = 'white';
      } else {
        breastBtn.style.borderColor = 'var(--breast)';
        breastBtn.style.background = 'var(--breast-bg)';
        formulaBtn.style.borderColor = normalBorder;
        formulaBtn.style.background = 'white';
      }
    }

    function hideMilkModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('milkModal').classList.remove('show');
    }

    function confirmMilk() {
      const amount = document.getElementById('milkAmount').value;
      if (!amount || parseInt(amount) <= 0) {
        showToast('请输入奶量');
        return;
      }
      const datetimeInput = document.getElementById('milkDateTime').value;
      const time = datetimeInput ? new Date(datetimeInput).toISOString() : new Date().toISOString();
      const type = selectedMilkType === 'formula' ? '喝奶-奶粉' : '喝奶-母乳';
      if (navigator.vibrate) navigator.vibrate(50);
      addRecord(type, parseInt(amount), time);
      hideMilkModal();
      const icon = type === '喝奶-奶粉' ? '🍼' : '🤱';
      showToast(`${icon} 已记录 ${amount}ml`);
      updateStats();
    }

    // 大便/小便弹窗
    function showPoopPeeModal(type) {
      pendingPoopPeeType = type;
      document.getElementById('poopPeeTitle').textContent = type === '大便' ? '💩 记录大便' : '🚼 记录小便';
      const now = new Date();
      const iso = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
      document.getElementById('poopPeeDateTime').value = iso;
      document.getElementById('poopPeeModal').classList.add('show');
    }

    function hidePoopPeeModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('poopPeeModal').classList.remove('show');
    }

    function confirmPoopPee() {
      const datetimeInput = document.getElementById('poopPeeDateTime').value;
      const time = datetimeInput ? new Date(datetimeInput).toISOString() : new Date().toISOString();
      if (navigator.vibrate) navigator.vibrate(50);
      addRecord(pendingPoopPeeType, null, time);
      hidePoopPeeModal();
      const icon = pendingPoopPeeType === '大便' ? '💩' : '🚼';
      showToast(`${icon} 已记录`);
      updateStats();
    }

    // 亲喂弹窗
    function showBreastFeedModal() {
      const now = new Date();
      const iso = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
      document.getElementById('breastFeedDateTime').value = iso;
      document.getElementById('breastFeedModal').classList.add('show');
    }

    function hideBreastFeedModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('breastFeedModal').classList.remove('show');
    }

    function confirmBreastFeed() {
      const datetimeInput = document.getElementById('breastFeedDateTime').value;
      const time = datetimeInput ? new Date(datetimeInput).toISOString() : new Date().toISOString();
      if (navigator.vibrate) navigator.vibrate(50);
      addRecord('亲喂', null, time);
      hideBreastFeedModal();
      showToast('🤱 亲喂已记录');
      updateStats();
    }

    // 今日详情弹窗
    function showTodayDetail(type) {
      const records = getRecords();
      const now = new Date();
      const todayStart = getStartOfDay(now);

      const titleMap = {
        '大便': '💩 今日大便',
        '小便': '🚼 今日小便',
        '喝奶': '🍼 今日喝奶（瓶喂）',
        '喂奶': '🍼🤱 今日喂奶（全部）'
      };

      document.getElementById('todayDetailTitle').textContent = titleMap[type] || '📋 今日详情';

      let filtered = records.filter(r => {
        const t = new Date(r.time);
        if (t < todayStart) return false;
        if (type === '大便') return r.type === '大便';
        if (type === '小便') return r.type === '小便';
        if (type === '喝奶') return r.type === '喝奶-奶粉' || r.type === '喝奶-母乳';
        if (type === '喂奶') return r.type === '喝奶-奶粉' || r.type === '喝奶-母乳' || r.type === '亲喂';
        return false;
      });

      filtered.sort((a, b) => new Date(b.time) - new Date(a.time));

      if (filtered.length === 0) {
        document.getElementById('todayDetailList').innerHTML = '<div style="text-align:center;color:var(--text-light);padding:20px;">暂无记录</div>';
      } else {
        document.getElementById('todayDetailList').innerHTML = filtered.map(r => {
          const d = new Date(r.time);
          const h = d.getHours().toString().padStart(2, '0');
          const m = d.getMinutes().toString().padStart(2, '0');
          const map = TYPE_MAP[r.type] || TYPE_MAP['大便'];
          const amountStr = (r.amount && r.amount > 0) ? ` ${r.amount}ml` : '';
          return `
            <div style="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
              <span style="font-size:22px;margin-right:12px;">${map.icon}</span>
              <span style="flex:1;font-size:14px;">${r.type}${amountStr}</span>
              <span style="color:var(--text-light);font-size:14px;">${h}:${m}</span>
            </div>
          `;
        }).join('');
      }

      document.getElementById('todayDetailModal').classList.add('show');
    }

    function hideTodayDetailModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('todayDetailModal').classList.remove('show');
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === tabId));
      if (tabId === 'historyTab') loadHistory();
    }

    function setHistoryFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === filter));
      loadHistory();
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return `${d.getMonth()+1}月${d.getDate()}日`;
    }

    function formatFull(iso) {
      const d = new Date(iso);
      const mon = d.getMonth() + 1;
      const day = d.getDate();
      const h = d.getHours().toString().padStart(2, '0');
      const m = d.getMinutes().toString().padStart(2, '0');
      return `${mon}月${day}日 ${h}:${m}`;
    }

    function getRelativeTime(iso) {
      const now = new Date();
      const d = new Date(iso);
      const diffMs = now - d;
      const diffMin = Math.floor(diffMs / 60000);
      const diffHr = Math.floor(diffMin / 60);
      const diffDay = Math.floor(diffHr / 24);
      if (diffMin < 1) return '刚刚';
      if (diffMin < 60) return `${diffMin}分钟前`;
      if (diffHr < 24) return `${diffHr}小时前`;
      if (diffDay < 7) return `${diffDay}天前`;
      return formatDate(iso);
    }

    // ========== 记录 ==========
    function record(type) {
      // 大便小便弹出时间选择
      if (type === '大便' || type === '小便') {
        showPoopPeeModal(type);
        return;
      }
      // 亲喂弹出时间选择
      if (type === '亲喂') {
        showBreastFeedModal();
        return;
      }
      // 瓶喂走另一个弹窗
      if (type === '喂奶') {
        showFeedMilkModal();
        return;
      }
      if (navigator.vibrate) navigator.vibrate(50);
      addRecord(type);
      const icon = type === '大便' ? '💩' : '🚼';
      showToast(`${icon} 已记录`);
      updateStats();
    }

    // ========== 统计 ==========
    function getStartOfDay(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
    function getStartOfWeek(d) { const day = d.getDay() || 7; return new Date(d - (day - 1) * 86400000); }
    function getStartOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }

    function updateStats() {
      const records = getRecords();
      const now = new Date();
      const todayStart = getStartOfDay(now);

      let todayPoop = 0, todayPee = 0, todayMilkAmount = 0, todayFeedCount = 0;

      records.forEach(r => {
        const t = new Date(r.time);
        if (t >= todayStart) {
          if (r.type === '大便') todayPoop++;
          else if (r.type === '小便') todayPee++;
          else if (r.type === '喝奶-奶粉' || r.type === '喝奶-母乳' || r.type === '亲喂') {
            if (r.type === '亲喂') {
              todayFeedCount++;
            } else {
              todayMilkAmount += (r.amount || 0);
              todayFeedCount++;
            }
          }
        }
      });

      document.getElementById('todayPoop').textContent = todayPoop;
      document.getElementById('todayPee').textContent = todayPee;
      document.getElementById('todayMilkAmount').textContent = todayMilkAmount;
      document.getElementById('todayFeedCount').textContent = todayFeedCount;
    }

    // ========== 历史 ==========
    function loadHistory() {
      const records = getRecords();
      const now = new Date();
      let startDate = null;

      if (currentFilter === 'today') startDate = getStartOfDay(now);
      else if (currentFilter === 'week') startDate = getStartOfWeek(now);
      else if (currentFilter === 'month') startDate = getStartOfMonth(now);

      const filtered = startDate
        ? records.filter(r => new Date(r.time) >= startDate)
        : records;

      // 汇总
      const total = filtered.length;
      const days = startDate ? Math.max(1, Math.ceil((now - startDate) / 86400000)) : 1;
      const avg = total / days;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('avgPerDay').textContent = avg.toFixed(1);

      // 列表
      const sorted = [...filtered].sort((a, b) => new Date(b.time) - new Date(a.time));

      const list = document.getElementById('historyList');
      if (sorted.length === 0) {
        list.innerHTML = '<div class="history-empty">暂无记录</div>';
        return;
      }

      list.innerHTML = sorted.map(r => {
        const map = TYPE_MAP[r.type] || TYPE_MAP['大便'];
        const amountStr = (r.amount && r.amount > 0) ? ` ${r.amount}ml` : '';
        return `
          <div class="history-item ${map.class}">
            <div class="time">${formatFull(r.time)}</div>
            <div class="type-icon">${map.icon}</div>
            <div class="info">
              <div class="type-name ${map.class}">${r.type}${amountStr}</div>
              <div class="relative">${getRelativeTime(r.time)}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    // ========== 导入导出 ==========
    function exportData() {
      const blob = new Blob([JSON.stringify(getRecords(), null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `baby-log-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      hideMenu();
      showToast('📤 导出成功');
    }

    async function importData(file) {
      if (!file) return;
      try {
        const imported = JSON.parse(await file.text());
        if (!Array.isArray(imported)) throw new Error('格式错误');
        const existing = getRecords();
        const seen = new Set(existing.map(r => r.id));
        const newRecords = imported.filter(r => !seen.has(r.id));
        saveRecords([...existing, ...newRecords]);
        hideMenu();
        showToast(`✅ 导入成功，新增 ${newRecords.length} 条`);
        updateStats();
        if (document.getElementById('historyTab').classList.contains('active')) loadHistory();
      } catch (e) {
        hideMenu();
        showToast('❌ 导入失败');
      }
    }

    // 初始化
    updateStats();
  </script>
</body>
</html>
